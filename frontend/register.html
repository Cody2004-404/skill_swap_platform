<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Join Skill Swap - Create your account and start exchanging skills today">
    <meta name="keywords" content="skill exchange, learning, teaching, collaboration, register">
    <meta name="author" content="Skill Swap Platform">
    <title>Skill Swap - Register | Start Your Learning Journey</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <div class="container">
        <main class="form-container">
            <header class="form-header">
                <h1>Skill Swap</h1>
                <p class="subtitle">Exchange Skills, Learn Together</p>
            </header>
            
            <form id="registerForm" class="auth-form" novalidate>
                <h2>Join Our Community! 🚀</h2>
                
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        required
                        placeholder="Enter your full name"
                        autocomplete="name"
                    >
                    <small>This is how other members will see you</small>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required
                        placeholder="Enter your email"
                        autocomplete="email"
                    >
                    <small>We'll never share your email</small>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        minlength="6"
                        placeholder="Create a strong password"
                        autocomplete="new-password"
                    >
                    <small>Minimum 6 characters • Mix letters, numbers & symbols</small>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <span>Create Account</span>
                </button>
                
                <div class="auth-link">
                    <p>Already have an account? <a href="index.html">Sign in here</a></p>
                </div>
            </form>
            
            <div id="message" class="message" role="alert" aria-live="polite" style="display: none;"></div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
